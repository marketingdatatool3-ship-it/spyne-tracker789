<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spyne Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Variables ────────────────────────────────────────────────────────── */
:root {
  --or:  #D94F04;
  --orl: #FF6B35;
  --orp: rgba(217,79,4,.12);
  --bg:  #0A0A0B;
  --s1:  #111114;
  --s2:  #18181C;
  --s3:  #222227;
  --b1:  #2A2A30;
  --b2:  #38383F;
  --tx:  #F0F0F2;
  --tm:  #8A8A95;
  --td:  #4A4A55;
  --gr:  #22C55E;
  --bl:  #3B82F6;
  --yw:  #F59E0B;
  --rd:  #EF4444;
  --pu:  #A855F7;
  --cy:  #06B6D4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}

/* ── Utilities ────────────────────────────────────────────────────────── */
.hidden{display:none!important}
.flex{display:flex}
.fac{align-items:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}

/* ── Login ────────────────────────────────────────────────────────────── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:var(--bg);
  position:relative;overflow:hidden;
}
.login-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(217,79,4,.18) 0%, transparent 70%);
  pointer-events:none;
}
.login-card{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:16px;
  padding:40px 40px 36px;
  width:380px;
  position:relative;z-index:1;
  box-shadow:0 40px 80px rgba(0,0,0,.5);
}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.lmark{
  width:36px;height:36px;background:var(--or);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;
}
.lname{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
.lsub{font-size:11px;color:var(--tm);margin-left:2px}
.login-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--tm);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tm);margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--s3);border:1px solid var(--b1);
  border-radius:8px;padding:10px 14px;color:var(--tx);
  font-size:13px;font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color .15s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--or)}
.form-input::placeholder{color:var(--td)}
.form-textarea{min-height:80px;resize:vertical}
.form-select option{background:var(--s2)}
.btn{
  padding:10px 18px;border-radius:8px;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--or);color:#fff}
.btn-primary:hover{background:var(--orl)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--s3);border:1px solid var(--b1);color:var(--tm)}
.btn-ghost:hover{color:var(--tx);background:var(--b1)}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--rd)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.login-err{color:var(--rd);font-size:12px;margin-top:8px}

/* ── App Shell ───────────────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#app.hidden{display:none}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar{
  width:220px;min-width:220px;background:var(--s1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-top{
  padding:16px 16px 12px;
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo{
  width:30px;height:30px;background:var(--or);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;
}
.sidebar-appname{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-section-label{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  color:var(--td);padding:8px 16px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;cursor:pointer;
  font-size:13px;color:var(--tm);
  border-left:3px solid transparent;
  transition:all .1s;user-select:none;
}
.nav-item:hover{background:var(--s2);color:var(--tx)}
.nav-item.active{
  background:var(--orp);color:var(--orl);
  border-left-color:var(--or);font-weight:500;
}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-badge{
  margin-left:auto;font-size:10px;
  background:var(--s3);color:var(--tm);
  border-radius:10px;padding:1px 7px;
}
.nav-item.active .nav-badge{background:var(--orp);color:var(--orl)}
.sidebar-bottom{
  padding:12px 14px;border-top:1px solid var(--b1);
}
.user-card{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  background:var(--s2);cursor:pointer;
  transition:background .1s;
}
.user-card:hover{background:var(--b1)}
.avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-info{overflow:hidden;flex:1}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{
  font-size:10px;color:var(--tm);
  text-transform:capitalize;
}
.logout-btn{
  font-size:11px;color:var(--td);cursor:pointer;
  padding:2px 6px;border-radius:4px;
}
.logout-btn:hover{color:var(--rd)}

/* ── Main ────────────────────────────────────────────────────────────── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* ── Top bar ─────────────────────────────────────────────────────────── */
.topbar{
  background:var(--s1);border-bottom:1px solid var(--b1);
  padding:0 24px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.topbar-actions{display:flex;align-items:center;gap:10px}

/* ── Stats bar ───────────────────────────────────────────────────────── */
.stats-row{
  background:var(--s1);border-bottom:1px solid var(--b1);
  padding:12px 24px;
  display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;
}
.stat-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--b1);
  border-radius:8px;padding:8px 14px;flex:1;min-width:100px;
}
.stat-ic{
  width:30px;height:30px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.stat-n{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;line-height:1}
.stat-l{font-size:10px;color:var(--tm);margin-top:2px}

/* ── Filters / toolbar ───────────────────────────────────────────────── */
.toolbar{
  padding:10px 24px;display:flex;gap:10px;align-items:center;
  border-bottom:1px solid var(--b1);flex-wrap:wrap;flex-shrink:0;
}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--td)}
.search-input{
  width:100%;background:var(--s2);border:1px solid var(--b1);
  border-radius:8px;padding:8px 12px 8px 34px;
  color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;
}
.search-input:focus{border-color:var(--or)}
.search-input::placeholder{color:var(--td)}
select.filter{
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:8px 12px;color:var(--tx);font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;
}
select.filter:focus{border-color:var(--or)}
select.filter option{background:var(--s2)}
.view-tabs{display:flex;gap:3px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:3px}
.vtab{
  padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;color:var(--tm);background:transparent;border:none;
  font-family:'DM Sans',sans-serif;transition:all .12s;
}
.vtab.active{background:var(--or);color:#fff}
.vtab:hover:not(.active){color:var(--tx)}
.res-count{font-size:12px;color:var(--tm);white-space:nowrap}

/* ── Content area ────────────────────────────────────────────────────── */
.content-area{flex:1;overflow:auto}

/* ── Table ───────────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:5;background:var(--s2)}
th{
  text-align:left;padding:10px 14px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--tm);border-bottom:1px solid var(--b1);
  white-space:nowrap;cursor:pointer;user-select:none;
}
th:hover{color:var(--tx)}
th.sa::after{content:' ↑';color:var(--or)}
th.sd::after{content:' ↓';color:var(--or)}
tr{border-bottom:1px solid var(--b1);cursor:pointer;transition:background .08s}
tr:hover td{background:rgba(255,255,255,.025)}
td{padding:10px 14px;vertical-align:middle}
td.kw{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Kanban ──────────────────────────────────────────────────────────── */
.kanban-wrap{display:flex;gap:14px;padding:16px 24px;overflow-x:auto;height:100%}
.k-col{min-width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.k-col-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--s2);
  border-radius:8px;border:1px solid var(--b1);font-size:12px;font-weight:600;
}
.k-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:12px;cursor:pointer;
  transition:border-color .12s,transform .1s;
}
.k-card:hover{border-color:var(--or);transform:translateY(-1px)}
.k-card-title{
  font-size:12px;font-weight:500;color:var(--tx);margin-bottom:8px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.k-card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}

/* ── Badges ──────────────────────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:500;border-radius:5px;padding:2px 8px;white-space:nowrap;
}
.bg{background:rgba(34,197,94,.12);color:#4ADE80}
.bb{background:rgba(59,130,246,.12);color:#60A5FA}
.by{background:rgba(245,158,11,.12);color:#FCD34D}
.br{background:rgba(239,68,68,.12);color:#F87171}
.bk{background:rgba(255,255,255,.06);color:var(--tm)}
.bo{background:rgba(217,79,4,.15);color:var(--orl)}
.bp{background:rgba(168,85,247,.12);color:#C084FC}
.bc{background:rgba(6,182,212,.12);color:#22D3EE}

.chip{
  display:inline-block;font-size:10px;font-weight:700;
  border-radius:4px;padding:2px 7px;text-transform:uppercase;letter-spacing:.04em;
}
.ch-blog{background:rgba(59,130,246,.12);color:#93C5FD}
.ch-lp{background:rgba(168,85,247,.12);color:#C084FC}
.ch-case{background:rgba(245,158,11,.12);color:#FCD34D}
.ch-book{background:rgba(6,182,212,.12);color:#5EEAD4}
.ch-oth{background:rgba(255,255,255,.06);color:#9CA3AF}

/* ── Modal / Drawer ──────────────────────────────────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:900;align-items:center;justify-content:center;
}
.overlay.open{display:flex}
.modal{
  background:var(--s1);border:1px solid var(--b1);border-radius:14px;
  padding:28px;max-width:600px;width:92vw;
  max-height:88vh;overflow-y:auto;position:relative;
  animation:su .18s ease;
}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:var(--s3);border:1px solid var(--b1);border-radius:6px;
  width:28px;height:28px;color:var(--tm);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.modal-close:hover{color:var(--tx);background:var(--b1)}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;line-height:1.3;padding-right:40px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--tm);margin-bottom:20px}
.sect{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--td);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--b1);
}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--td);margin-bottom:3px}
.mf-v{font-size:13px;color:var(--tx)}

/* Pipeline track */
.pipeline{display:flex;margin-bottom:6px}
.pstage{
  flex:1;padding:10px 6px;text-align:center;
  background:var(--s3);border:1px solid var(--b1);border-right:none;
  font-size:10px;
}
.pstage:first-child{border-radius:6px 0 0 6px}
.pstage:last-child{border-radius:0 6px 6px 0;border-right:1px solid var(--b1)}
.pstage.done{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25)}
.pstage.act{background:var(--orp);border-color:var(--or)}
.pstage-ic{font-size:16px;display:block;margin-bottom:4px}
.pstage-l{color:var(--tm);font-weight:600}
.pstage.done .pstage-l{color:#4ADE80}
.pstage.act  .pstage-l{color:var(--orl)}

/* Drawer */
.drawer-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:800;justify-content:flex-end;
}
.drawer-overlay.open{display:flex}
.drawer{
  background:var(--s1);border-left:1px solid var(--b1);
  width:460px;max-width:96vw;height:100%;overflow-y:auto;
  padding:24px;animation:dri .18s ease;
}
@keyframes dri{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:22px;
}
.drawer-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.form-actions{display:flex;gap:10px;margin-top:22px}
.form-actions .btn{flex:1;padding:11px}

/* Users page */
.users-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;padding:24px;
}
.user-tile{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  padding:16px;display:flex;flex-direction:column;gap:12px;
}
.user-tile-hd{display:flex;align-items:center;gap:12px}
.av-lg{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-tile-name{font-weight:600;font-size:14px}
.user-tile-email{font-size:12px;color:var(--tm)}
.user-tile-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-tile-actions{display:flex;gap:8px}

/* Activity log */
.act-item{
  display:flex;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--b1);
}
.act-item:last-child{border:none}
.act-av{width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.act-text{font-size:13px;color:var(--tx)}
.act-time{font-size:11px;color:var(--td);margin-top:2px}

/* Empty / loading */
.ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--tm);gap:12px;height:100%}
.spinner{width:30px;height:30px;border:3px solid var(--b1);border-top-color:var(--or);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:12px 18px;font-size:13px;display:flex;align-items:center;gap:10px;
  animation:su .18s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);
}

/* Responsive */
@media(max-width:700px){
  .sidebar{display:none}
  .form-row2{grid-template-columns:1fr}
  .mgrid{grid-template-columns:1fr}
  .stats-row{gap:6px}
  .stat-pill{min-width:calc(50% - 5px)}
}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="lmark">S</div>
      <span class="lname">Spyne</span>
      <span class="lsub">Tracker</span>
    </div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to manage content & design</div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="li-email" type="email" placeholder="you@spyne.ai" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="li-pw" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-err hidden" id="li-err"></div>
    <button class="btn btn-primary btn-full" id="li-btn" onclick="doLogin()" style="margin-top:8px">Sign In</button>
    <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--td)">
      Default: admin@spyne.ai / spyne2024
    </div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">S</div>
      <span class="sidebar-appname">Spyne</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- injected by JS -->
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" onclick="goPage('profile')">
        <div class="avatar" id="sb-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="sb-name"></div>
          <div class="user-role" id="sb-role"></div>
        </div>
        <span class="logout-btn" onclick="doLogout(event)" title="Sign out">⏻</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <div id="page-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
  </div>
</div>

<!-- ══════════════════ ITEM DETAIL MODAL ══════════════════ -->
<div class="overlay" id="item-modal" onclick="closeItemModal(event)">
  <div class="modal" id="item-modal-body"></div>
</div>

<!-- ══════════════════ ADD/EDIT DRAWER ══════════════════ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer-body"></div>
</div>

<!-- ══════════════════ CONFIRM MODAL ══════════════════ -->
<div class="overlay" id="confirm-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-title" id="confirm-title" style="margin-bottom:10px"></div>
    <div id="confirm-body" style="font-size:13px;color:var(--tm);margin-bottom:22px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('confirm-modal').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" style="flex:1" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
let ME = null;
let ITEMS = [];
let USERS = [];
let filtered = [];
let sortCol = null, sortDir = 1;
let currentPage = 'items';
let viewMode = 'table';
let sideFilter = { type: 'status', val: 'all' };

// ══════════════════════════════════════════════════════════════════════════════
// API helpers
// ══════════════════════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'Request failed');
  return j;
}
const GET  = p      => api('GET',    p);
const POST = (p, b) => api('POST',   p, b);
const PUT  = (p, b) => api('PUT',    p, b);
const DEL  = p      => api('DELETE', p);

// ══════════════════════════════════════════════════════════════════════════════
// Auth
// ══════════════════════════════════════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pw    = document.getElementById('li-pw').value;
  const btn   = document.getElementById('li-btn');
  const err   = document.getElementById('li-err');
  if (!email || !pw) { showLoginErr('Enter email and password'); return; }
  btn.textContent = 'Signing in…'; btn.disabled = true; err.classList.add('hidden');
  try {
    const data = await POST('/api/auth/login', { email, password: pw });
    ME = data.user;
    bootApp();
  } catch (e) { showLoginErr(e.message); }
  finally { btn.textContent = 'Sign In'; btn.disabled = false; }
}
function showLoginErr(msg) {
  const el = document.getElementById('li-err');
  el.textContent = msg; el.classList.remove('hidden');
}
document.getElementById('li-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogout(e) {
  e?.stopPropagation();
  await POST('/api/auth/logout');
  ME = null; ITEMS = []; USERS = [];
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

async function checkAuth() {
  try {
    ME = await GET('/api/auth/me');
    bootApp();
  } catch { /* not logged in */ }
}

// ══════════════════════════════════════════════════════════════════════════════
// Boot
// ══════════════════════════════════════════════════════════════════════════════
async function bootApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  buildSidebar();
  updateSidebarUser();
  await Promise.all([loadItems(), loadUsers()]);
  goPage('items');
}

function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const items = [
    { page:'items',  icon:'📋', label:'All Content',   role:['admin','content','design'] },
    { page:'kanban', icon:'🗂️', label:'Board View',    role:['admin','content','design'] },
    { page:'design', icon:'🎨', label:'Design Queue',  role:['admin','design'] },
    { page:'stats',  icon:'📊', label:'Stats',         role:['admin','content'] },
    { page:'users',  icon:'👥', label:'Team Members',  role:['admin'] },
  ];
  nav.innerHTML = items
    .filter(i => i.role.includes(ME.role))
    .map(i => `
      <div class="nav-item" data-page="${i.page}" onclick="goPage('${i.page}')">
        <span class="nav-icon">${i.icon}</span>
        <span>${i.label}</span>
        ${i.badge !== undefined ? `<span class="nav-badge" id="nb-${i.page}">${i.badge}</span>` : ''}
      </div>`).join('');
}

function updateSidebarUser() {
  const av = document.getElementById('sb-avatar');
  av.textContent = initials(ME.name);
  av.style.background = ME.avatar_color || '#D94F04';
  document.getElementById('sb-name').textContent = ME.name;
  document.getElementById('sb-role').textContent = ME.role;
}

// ══════════════════════════════════════════════════════════════════════════════
// Data loading
// ══════════════════════════════════════════════════════════════════════════════
async function loadItems() {
  ITEMS = await GET('/api/items');
}
async function loadUsers() {
  USERS = await GET('/api/users');
}

function designerUsers() { return USERS.filter(u => ['design','admin'].includes(u.role)); }
function writerUsers()   { return USERS.filter(u => ['content','admin'].includes(u.role)); }

// ══════════════════════════════════════════════════════════════════════════════
// Navigation
// ══════════════════════════════════════════════════════════════════════════════
function goPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const titles = { items:'All Content', kanban:'Board View', design:'Design Queue', stats:'Stats', users:'Team Members', profile:'My Profile' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';

  if (page === 'items' || page === 'kanban' || page === 'design') {
    if (['admin','content'].includes(ME.role)) {
      actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openAddDrawer()">+ Add Content</button>`;
    }
    renderItemsPage(page);
  } else if (page === 'stats') {
    renderStats();
  } else if (page === 'users') {
    if (ME.role === 'admin') {
      actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openUserDrawer()">+ Add User</button>`;
    }
    renderUsers();
  } else if (page === 'profile') {
    renderProfile();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// Items page
// ══════════════════════════════════════════════════════════════════════════════
function renderItemsPage(page) {
  const pc = document.getElementById('page-content');

  // Build stats
  const statsHtml = buildStatsBar(ITEMS);

  // Build filter toolbar
  const writers   = [...new Set(ITEMS.map(r=>r.writer?.name).filter(Boolean))].sort();
  const designers = [...new Set(ITEMS.map(r=>r.designer?.name).filter(Boolean))].sort();
  const clusters  = [...new Set(ITEMS.map(r=>r.cluster).filter(Boolean))].sort();

  pc.innerHTML = `
    ${statsHtml}
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="srch" placeholder="Search keywords, writers, clusters…" oninput="applyFilters()">
      </div>
      <select class="filter" id="f-status" onchange="applyFilters()">
        <option value="">All Statuses</option>
        <option>In Progress</option><option>Content Done</option>
        <option>In Content Review</option><option>Published</option>
        <option>TBP</option><option>On Hold</option>
      </select>
      <select class="filter" id="f-type" onchange="applyFilters()">
        <option value="">All Types</option>
        <option>Blog</option><option>Landing Page</option>
        <option>Case Study</option><option>Ebook</option><option>Whitepaper</option>
      </select>
      <select class="filter" id="f-writer" onchange="applyFilters()">
        <option value="">All Writers</option>
        ${writers.map(w=>`<option>${w}</option>`).join('')}
      </select>
      <select class="filter" id="f-designer" onchange="applyFilters()">
        <option value="">All Designers</option>
        ${designers.map(d=>`<option>${d}</option>`).join('')}
      </select>
      <div class="view-tabs">
        <button class="vtab ${viewMode==='table'?'active':''}" onclick="setView('table',this)">Table</button>
        <button class="vtab ${viewMode==='kanban'?'active':''}" onclick="setView('kanban',this)">Board</button>
      </div>
      <span class="res-count" id="res-count"></span>
    </div>
    <div class="content-area" id="content-area"></div>
  `;

  // Design queue: pre-filter to items assigned to current designer
  if (page === 'design' && ME.role === 'design') {
    // Items already filtered server-side, just set sideFilter visually
  }

  applyFilters();
}

function buildStatsBar(data) {
  const stats = [
    ['📄','rgba(59,130,246,.12)', data.length, 'var(--tx)', 'Total'],
    ['🚀','rgba(34,197,94,.12)',  data.filter(r=>r.overall_status==='Published').length, '#4ADE80', 'Published'],
    ['✍️','rgba(245,158,11,.12)', data.filter(r=>r.content_status==='Completed').length, '#FCD34D', 'Content Done'],
    ['🎨','rgba(217,79,4,.15)',   data.filter(r=>r.design_status==='Design Done').length, '#FF6B35', 'Design Done'],
    ['⏳','rgba(168,85,247,.12)', data.filter(r=>r.overall_status==='In Progress').length, '#C084FC', 'In Progress'],
  ];
  return `<div class="stats-row">${stats.map(([ic,bg,n,c,l])=>`
    <div class="stat-pill">
      <div class="stat-ic" style="background:${bg}">${ic}</div>
      <div><div class="stat-n" style="color:${c}">${n}</div><div class="stat-l">${l}</div></div>
    </div>`).join('')}</div>`;
}

function applyFilters() {
  const q   = (document.getElementById('srch')?.value||'').toLowerCase();
  const fst = document.getElementById('f-status')?.value||'';
  const fty = document.getElementById('f-type')?.value||'';
  const fwr = document.getElementById('f-writer')?.value||'';
  const fds = document.getElementById('f-designer')?.value||'';

  filtered = ITEMS.filter(r => {
    if (fst && r.overall_status !== fst) return false;
    if (fty && r.type !== fty) return false;
    if (fwr && r.writer?.name !== fwr) return false;
    if (fds && r.designer?.name !== fds) return false;
    if (q) {
      const hay = [r.keywords,r.type,r.cluster,r.category,r.writer?.name,r.designer?.name,r.overall_status].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sortCol) {
    filtered.sort((a,b) => {
      const av = (a[sortCol]||'').toLowerCase();
      const bv = (b[sortCol]||'').toLowerCase();
      return av<bv ? -sortDir : av>bv ? sortDir : 0;
    });
  }

  document.getElementById('res-count').textContent = `${filtered.length} of ${ITEMS.length}`;
  viewMode === 'table' ? renderTable() : renderKanban();
}

function setView(v, btn) {
  viewMode = v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ── Table render ──────────────────────────────────────────────────────────────
function renderTable() {
  const ca = document.getElementById('content-area');
  if (!filtered.length) {
    ca.innerHTML = `<div class="ctr"><div class="icon">🔍</div><p>No items match your filters</p></div>`;
    return;
  }
  ca.innerHTML = `
    <table>
      <thead><tr>
        <th style="width:28px">#</th>
        <th onclick="sort('keywords',this)">Keyword / Title</th>
        <th onclick="sort('type',this)">Type</th>
        <th onclick="sort('cluster',this)">Cluster</th>
        <th>Writer</th>
        <th>Designer</th>
        <th onclick="sort('content_status',this)">Content</th>
        <th onclick="sort('design_status',this)">Design</th>
        <th onclick="sort('overall_status',this)">Status</th>
        <th onclick="sort('content_delivery_date',this)">Delivered</th>
      </tr></thead>
      <tbody>${filtered.map((r,i) => `
        <tr onclick="openItemModal('${r.id}')">
          <td style="color:var(--td);font-size:11px">${i+1}</td>
          <td class="kw">
            ${r.approved==='Yes'?`<span style="width:7px;height:7px;border-radius:50%;background:var(--gr);display:inline-block;margin-right:5px"></span>`:''}
            <span style="font-weight:500">${r.keywords}</span>
          </td>
          <td>${typeChip(r.type)}</td>
          <td style="font-size:12px;color:var(--tm)">${r.cluster||'—'}</td>
          <td>${avatarChip(r.writer)}</td>
          <td>${avatarChip(r.designer)}</td>
          <td>${contentBadge(r.content_status)}</td>
          <td>${designBadge(r.design_status)}</td>
          <td>${statusBadge(r.overall_status)}</td>
          <td style="font-size:12px;color:var(--tm)">${r.content_delivery_date||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Kanban render ─────────────────────────────────────────────────────────────
function renderKanban() {
  const ca = document.getElementById('content-area');
  const cols = {
    'Published':        {label:'Published',    color:'#22C55E', items:[]},
    'Content Done':     {label:'Content Done', color:'#F59E0B', items:[]},
    'In Progress':      {label:'In Progress',  color:'#3B82F6', items:[]},
    'In Content Review':{label:'In Review',    color:'#A855F7', items:[]},
    'Other':            {label:'TBP / Other',  color:'#555',    items:[]},
  };
  filtered.forEach(r => {
    const s = r.overall_status;
    if (cols[s]) cols[s].items.push(r);
    else cols['Other'].items.push(r);
  });
  ca.innerHTML = `<div class="kanban-wrap">${Object.entries(cols).map(([,c])=>`
    <div class="k-col">
      <div class="k-col-hd">
        <span style="color:${c.color}">${c.label}</span>
        <span style="font-size:11px;color:var(--tm);background:var(--s3);border-radius:10px;padding:1px 7px">${c.items.length}</span>
      </div>
      ${c.items.slice(0,50).map(r=>`
        <div class="k-card" onclick="openItemModal('${r.id}')">
          <div class="k-card-title">${r.keywords}</div>
          <div class="k-card-footer">
            ${typeChip(r.type)}
            ${avatarChip(r.designer,'tiny')}
          </div>
        </div>`).join('')}
    </div>`).join('')}</div>`;
}

function sort(col, th) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sa','sd'));
  th.classList.add(sortDir===1?'sa':'sd');
  applyFilters();
}

// ══════════════════════════════════════════════════════════════════════════════
// Item detail modal
// ══════════════════════════════════════════════════════════════════════════════
async function openItemModal(id) {
  const r = ITEMS.find(x=>x.id===id); if (!r) return;

  const canEdit = ME.role === 'admin' || ME.role === 'content' ||
    (ME.role === 'design' && r.design_assignee_id === ME.id);

  const stages = [
    {l:'Assigned', ic:'📋', done:!!r.seo_assigned_date, act:false},
    {l:'Writing',  ic:'✍️',  done:r.content_status==='Completed', act:r.content_status==='In progress'},
    {l:'Review',   ic:'🔍', done:['Content Done','Published'].includes(r.overall_status), act:r.content_status==='In Review'},
    {l:'Design',   ic:'🎨', done:r.design_status==='Design Done', act:r.design_status==='In Progress'},
    {l:'Live',     ic:'🚀', done:r.overall_status==='Published', act:false},
  ];

  let logs = [];
  try { logs = await GET(`/api/items/${id}/activity`); } catch {}

  document.getElementById('item-modal-body').innerHTML = `
    <button class="modal-close" onclick="document.getElementById('item-modal').classList.remove('open')">✕</button>
    <div class="modal-title">${r.keywords}</div>
    <div class="modal-sub">${[typeChip(r.type), r.category, r.cluster].filter(Boolean).join(' · ')}</div>

    <div class="sect">Pipeline</div>
    <div class="pipeline">${stages.map(s=>`
      <div class="pstage ${s.done?'done':s.act?'act':''}">
        <span class="pstage-ic">${s.ic}</span>
        <div class="pstage-l">${s.l}</div>
      </div>`).join('')}</div>

    <div class="sect">Details</div>
    <div class="mgrid">
      ${mf('Writer',   r.writer?.name||'—')}
      ${mf('Designer', r.designer?.name||'—')}
      ${mf('Content',  contentBadge(r.content_status))}
      ${mf('Design',   designBadge(r.design_status))}
      ${mf('Status',   statusBadge(r.overall_status))}
      ${mf('Approved', r.approved==='Yes'?'<span class="badge bg">✓ Yes</span>':'—')}
    </div>

    <div class="sect">Dates</div>
    <div class="mgrid">
      ${mf('SEO Assigned',     r.seo_assigned_date||'—')}
      ${mf('Content Delivered',r.content_delivery_date||'—')}
      ${mf('Design Assigned',  r.design_assign_date||'—')}
      ${mf('Design Delivered', r.design_delivery_date||'—')}
    </div>

    ${r.live_url?`<div class="sect">Live URL</div>
      <a href="${r.live_url}" target="_blank" style="color:var(--orl);font-size:13px;word-break:break-all">${r.live_url}</a>`:''}

    ${r.notes?`<div class="sect">Notes</div><p style="font-size:13px;color:var(--tm)">${r.notes}</p>`:''}

    <div style="display:flex;gap:10px;margin-top:22px">
      ${canEdit?`<button class="btn btn-primary btn-sm" onclick="openEditDrawer('${id}');document.getElementById('item-modal').classList.remove('open')">Edit Item</button>`:''}
      ${ME.role==='admin'?`<button class="btn btn-danger btn-sm" onclick="confirmDelete('${id}');document.getElementById('item-modal').classList.remove('open')">Delete</button>`:''}
    </div>

    ${logs.length?`<div class="sect">Activity</div>
      <div>${logs.slice(0,8).map(l=>`
        <div class="act-item">
          <div class="act-av" style="background:${l.avatar_color||'#D94F04'}">${initials(l.user_name)}</div>
          <div><div class="act-text">${l.action} by <b>${l.user_name||'?'}</b></div>
               <div class="act-time">${formatDate(l.created_at)}</div></div>
        </div>`).join('')}</div>`:''}
  `;
  document.getElementById('item-modal').classList.add('open');
}

function mf(l, v) {
  return `<div><div class="mf-l">${l}</div><div class="mf-v">${v}</div></div>`;
}

function closeItemModal(e) {
  if (e.target===document.getElementById('item-modal')) document.getElementById('item-modal').classList.remove('open');
}

// ══════════════════════════════════════════════════════════════════════════════
// Add / Edit Drawer
// ══════════════════════════════════════════════════════════════════════════════
function openAddDrawer()  { renderDrawer(null); }
function openEditDrawer(id) { renderDrawer(ITEMS.find(x=>x.id===id)||null, id); }

function renderDrawer(item, editId) {
  const isEdit   = !!editId;
  const designers = designerUsers();
  const writers   = writerUsers();
  const isDesign  = ME.role === 'design';

  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-hd">
      <div class="drawer-title">${isEdit?'Edit Content Item':'Add Content Item'}</div>
      <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">✕</button>
    </div>
    <form id="item-form" onsubmit="submitItem(event,'${editId||''}')">
      ${!isDesign ? `
      <div class="form-group">
        <label class="form-label">Keyword / Title *</label>
        <input class="form-input" name="keywords" required placeholder="e.g. automotive BDC software" value="${item?.keywords||''}">

      <div class="form-row2">

          <label class="form-label">Category</label>

        </div>
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Cluster</label>
          <input class="form-input" name="cluster" placeholder="e.g. AI BDC" value="${item?.cluster||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Content Writer</label>
          <select class="form-select" name="content_writer_id">
            <option value="">— Assign —</option>
            ${writers.map(u=>`<option value="${u.id}" ${item?.content_writer_id===u.id?'selected':''}>${u.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Content Status</label>
          <select class="form-select" name="content_status">
            ${['Not Started','In progress','In Review','Completed'].map(s=>`<option ${(item?.content_status||'Not Started')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">SEO Assigned</label>
          <input class="form-input" name="seo_assigned_date" type="date" value="${item?.seo_assigned_date||''}">
        </div>
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Content Delivery</label>
          <input class="form-input" name="content_delivery_date" type="date" value="${item?.content_delivery_date||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Overall Status</label>
          <select class="form-select" name="overall_status">
            ${['In Progress','Content Done','In Content Review','Published','TBP','On Hold'].map(s=>`<option ${(item?.overall_status||'In Progress')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      ` : ''}

      <div class="sect">Design Assignment</div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Assign Designer</label>
          <select class="form-select" name="design_assignee_id" ${isDesign?'disabled':''}>
            <option value="">— Assign —</option>
            ${designers.map(u=>`<option value="${u.id}" ${item?.design_assignee_id===u.id?'selected':''}>${u.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Design Status</label>
          <select class="form-select" name="design_status">
            ${['Not Assigned','In Progress','Design Done','TBP'].map(s=>`<option ${(item?.design_status||'Not Assigned')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Design Assign Date</label>
          <input class="form-input" name="design_assign_date" type="date" value="${item?.design_assign_date||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Design Delivery</label>
          <input class="form-input" name="design_delivery_date" type="date" value="${item?.design_delivery_date||''}">
        </div>
      </div>

      ${!isDesign ? `
      <div class="sect">Publishing</div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Approved</label>
          <select class="form-select" name="approved">
            <option value="">—</option>
            <option ${item?.approved==='Yes'?'selected':''}>Yes</option>
            <option ${item?.approved==='No'?'selected':''}>No</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Live URL</label>
          <input class="form-input" name="live_url" type="url" placeholder="https://spyne.ai/…" value="${item?.live_url||''}">
        </div>
      </div>
      ` : ''}

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" name="notes" placeholder="Any notes, blockers, context…">${item?.notes||''}</textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="drawer-submit">${isEdit?'Save Changes':'Add to Tracker'}</button>
      </div>
    </form>
  `;
  document.getElementById('drawer-overlay').classList.add('open');
}

async function submitItem(e, editId) {
  e.preventDefault();
  const btn = document.getElementById('drawer-submit');
  btn.disabled = true; btn.textContent = 'Saving…';
  const fd = new FormData(e.target);
  const body = {};
  fd.forEach((v,k) => { body[k] = v || null; });

  try {
    if (editId) {
      const updated = await PUT(`/api/items/${editId}`, body);
      const idx = ITEMS.findIndex(x=>x.id===editId);
      if (idx>=0) ITEMS[idx] = updated;
    } else {
      const created = await POST('/api/items', body);
      ITEMS.unshift(created);
    }
    closeDrawer();
    showToast(editId ? '✅ Item updated' : '✅ Item added');
    goPage(currentPage);
  } catch (err) {
    showToast('⚠ ' + err.message, true);
  } finally {
    btn.disabled = false; btn.textContent = editId ? 'Save Changes' : 'Add to Tracker';
  }
}

function closeDrawer(e) {
  if (!e || e.target === document.getElementById('drawer-overlay'))
    document.getElementById('drawer-overlay').classList.remove('open');
}

// ══════════════════════════════════════════════════════════════════════════════
// Delete confirm
// ══════════════════════════════════════════════════════════════════════════════
function confirmDelete(id) {
  const r = ITEMS.find(x=>x.id===id);
  document.getElementById('confirm-title').textContent = 'Delete item?';
  document.getElementById('confirm-body').textContent = `"${r?.keywords}" will be permanently removed.`;
  document.getElementById('confirm-ok').onclick = async () => {
    try {
      await DEL(`/api/items/${id}`);
      ITEMS = ITEMS.filter(x=>x.id!==id);
      document.getElementById('confirm-modal').classList.remove('open');
      showToast('🗑 Item deleted');
      goPage(currentPage);
    } catch(err) { showToast('⚠ '+err.message, true); }
  };
  document.getElementById('confirm-modal').classList.add('open');
}

// ══════════════════════════════════════════════════════════════════════════════
// Stats page
// ══════════════════════════════════════════════════════════════════════════════
async function renderStats() {
  const pc = document.getElementById('page-content');

  try {
    const s = await GET('/api/stats');
    pc.innerHTML = `
      <div style="padding:24px;overflow:auto;flex:1">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px">
          ${statBox('📄','Total Items', s.total, 'var(--tx)')}
          ${statBox('🚀','Published',   s.published, '#4ADE80')}
          ${statBox('🎨','Design Done', s.designDone,'#FF6B35')}
          ${statBox('⏳','In Progress', s.inProgress,'#C084FC')}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div style="background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:20px">
            <div style="font-family:Syne,sans-serif;font-weight:600;margin-bottom:16px">By Content Type</div>
            ${s.byType.map(t=>`
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
                <div style="font-size:13px;width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tm)">${t.type||'Unknown'}</div>
                <div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
                  <div style="height:100%;background:var(--or);border-radius:3px;width:${Math.round(t.count/s.total*100)}%"></div>
                </div>
                <div style="font-size:12px;color:var(--tm);width:28px;text-align:right">${t.count}</div>
              </div>`).join('')}
          </div>
          <div style="background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:20px">
            <div style="font-family:Syne,sans-serif;font-weight:600;margin-bottom:16px">By Writer</div>
            ${s.byWriter.length ? s.byWriter.map(w=>`
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
                <div style="font-size:13px;width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tm)">${w.name}</div>
                <div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
                  <div style="height:100%;background:var(--bl);border-radius:3px;width:${Math.round(w.count/s.total*100)}%"></div>
                </div>
                <div style="font-size:12px;color:var(--tm);width:28px;text-align:right">${w.count}</div>
              </div>`).join('') : '<p style="color:var(--td);font-size:13px">No data yet</p>'}
          </div>
        </div>
      </div>`;
  } catch(err) {
    pc.innerHTML = `<div class="ctr"><p style="color:var(--rd)">${err.message}</p></div>`;
  }
}
function statBox(ic, l, n, c) {
  return `<div style="background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:18px;display:flex;gap:12px;align-items:center">
    <div style="font-size:24px">${ic}</div>
    <div><div style="font-family:Syne,sans-serif;font-weight:700;font-size:26px;color:${c};line-height:1">${n}</div>
    <div style="font-size:12px;color:var(--tm);margin-top:3px">${l}</div></div></div>`;
}

function openUserDrawer()      { renderUserDrawer(null); }
function openUserEditDrawer(id){ renderUserDrawer(USERS.find(u=>u.id===id)); }

function renderUserDrawer(user) {
  const isEdit = !!user;
  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-hd">
      <div class="drawer-title">${isEdit?'Edit User':'Add Team Member'}</div>
      <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">✕</button>
    </div>
    <form id="user-form" onsubmit="submitUser(event,'${user?.id||''}')">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-input" name="name" required value="${user?.name||''}" placeholder="e.g. Komal Sharma">
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input class="form-input" name="email" type="email" ${isEdit?'disabled':''} required value="${user?.email||''}" placeholder="komal@spyne.ai">
      </div>
      <div class="form-group">
        <label class="form-label">${isEdit?'New Password (leave blank to keep)':'Password *'}</label>
        <input class="form-input" name="password" type="password" ${isEdit?'':'required'} placeholder="••••••••">
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select class="form-select" name="role" required>
            ${['admin','content','design'].map(r=>`<option ${user?.role===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Avatar Color</label>
          <input class="form-input" name="avatar_color" type="color" value="${user?.avatar_color||'#D94F04'}" style="height:40px;padding:4px">
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="user-submit">${isEdit?'Save Changes':'Add Member'}</button>
      </div>
    </form>`;
  document.getElementById('drawer-overlay').classList.add('open');
}

async function submitUser(e, editId) {
  e.preventDefault();
  const btn = document.getElementById('user-submit');
  btn.disabled=true; btn.textContent='Saving…';
  const fd=new FormData(e.target); const body={};
  fd.forEach((v,k)=>{body[k]=v||null});
  try {
    if (editId) {
      await PUT(`/api/users/${editId}`, body);
      const idx=USERS.findIndex(u=>u.id===editId);
      if (idx>=0) { USERS[idx]={...USERS[idx],...body}; }
    } else {
      const res = await POST('/api/users', body);
      USERS.push({id:res.id,...body});
    }
    closeDrawer();
    showToast(editId?'✅ User updated':'✅ User added');
    renderUsers();
  } catch(err) { showToast('⚠ '+err.message,true); }
  finally { btn.disabled=false; btn.textContent=editId?'Save Changes':'Add Member'; }
}

function confirmDeleteUser(id, name) {
  document.getElementById('confirm-title').textContent='Remove user?';
  document.getElementById('confirm-body').textContent=`${name} will lose access.`;
  document.getElementById('confirm-ok').onclick=async()=>{
    try {
      await DEL(`/api/users/${id}`);
      USERS=USERS.filter(u=>u.id!==id);
      document.getElementById('confirm-modal').classList.remove('open');
      showToast('🗑 User removed');
      renderUsers();
    } catch(err){showToast('⚠ '+err.message,true);}
  };
  document.getElementById('confirm-modal').classList.add('open');
}

async function saveProfile(e) {
  e.preventDefault();
  const fd=new FormData(e.target); const body={};
  fd.forEach((v,k)=>{if(v) body[k]=v;});
  try {
    await PUT(`/api/users/${ME.id}`, body);
    if (body.name) ME.name=body.name;
    if (body.avatar_color) ME.avatar_color=body.avatar_color;
    updateSidebarUser();
    showToast('✅ Profile saved');
  } catch(err){showToast('⚠ '+err.message,true);}
}

// ══════════════════════════════════════════════════════════════════════════════
// Badge / chip helpers
// ══════════════════════════════════════════════════════════════════════════════
const statusBadge = s => {
  if (!s) return '<span class="badge bk">—</span>';
  const m={Published:'bg','Content Done':'by','In Progress':'bb','In Content Review':'bp',TBP:'bk','On Hold':'br','With Tanishq(ams issue)':'bo'};
  return `<span class="badge ${m[s]||'bk'}">${s}</span>`;
};
const contentBadge = s => {
  if (!s) return '<span class="badge bk">—</span>';
  const m={Completed:'bg','In progress':'bb','In Review':'bp','Not Started':'bk'};
  return `<span class="badge ${m[s]||'bk'}">${s}</span>`;
};
const designBadge = s => {
  if (!s||s==='Not Assigned') return '<span class="badge bk">—</span>';
  if (s==='Design Done')  return '<span class="badge bg">Done</span>';
  if (s==='In Progress')  return '<span class="badge bb">In Progress</span>';
  return `<span class="badge bk">${s}</span>`;
};
const typeChip = t => {
  if (!t) return '';
  const m={Blog:'ch-blog','Landing Page':'ch-lp','Case Study':'ch-case',Ebook:'ch-book',Whitepaper:'ch-book'};
  return `<span class="chip ${m[t]||'ch-oth'}">${t==='Landing Page'?'LP':t==='Case Study'?'Case':t}</span>`;
};
const avatarChip = (u, size) => {
  if (!u) return '<span style="color:var(--td);font-size:12px">—</span>';
  const s = size==='tiny' ? 'width:20px;height:20px;font-size:9px' : 'width:24px;height:24px;font-size:10px';
  return `<span style="display:inline-flex;align-items:center;gap:6px">
    <span style="border-radius:50%;background:${u.avatar_color||'#555'};color:#fff;font-weight:700;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;${s}">${initials(u.name)}</span>
    ${size!=='tiny'?`<span style="font-size:12px;color:var(--tm)">${u.name}</span>`:''}
  </span>`;
};

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}); }
  catch { return d; }
}

// ══════════════════════════════════════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════════════════════════════════════
function showToast(msg, err=false) {
  const t=document.createElement('div'); t.className='toast';
  t.style.borderColor=err?'rgba(239,68,68,.4)':'rgba(34,197,94,.4)';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}
